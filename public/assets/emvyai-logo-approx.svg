<svg width="1440" height="520" viewBox="0 0 1440 520" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="emvyBluePurple" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00A3FF"/>
      <stop offset="48%" stop-color="#3B5BFF"/>
      <stop offset="100%" stop-color="#B02CFF"/>
    </linearGradient>
    <linearGradient id="emvyWhiteMetal" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="52%" stop-color="#DDE4F2"/>
      <stop offset="100%" stop-color="#FFFFFF"/>
