      <feColorMatrix in="blur" type="matrix" values="0 0 0 0 0.5  0 0 0 0 0.05  0 0 0 0 1  0 0 0 0.8 0"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="1440" height="520" fill="#030717"/>

  <!-- EMVYAI gateway M mark: approximate reconstruction from screenshot, not original source vector -->
